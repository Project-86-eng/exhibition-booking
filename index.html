<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองเข้าชมนิทรรศการ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1410;--ink2:#4a3f35;--ink3:#8a7a6e;
    --cream:#faf8f4;--cream2:#f2ede4;--cream3:#e8e0d2;
    --gold:#b8860b;--gold3:#f0c040;
    --accent:#2c5f4a;--accent2:#3d7a60;
    --danger:#c0392b;--success:#2c5f4a;--warn:#c07a10;
  }
  body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
  .app{max-width:720px;margin:0 auto;padding:2rem 1rem 4rem}

  .header{text-align:center;padding:2.5rem 0 2rem;border-bottom:1px solid var(--cream3);margin-bottom:2rem}
  .header-badge{display:inline-block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold3);padding:4px 14px;border-radius:20px;margin-bottom:1rem;font-weight:500}
  .header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:.5rem}
  .header p{font-size:14px;color:var(--ink3);line-height:1.7}

  .section-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:.75rem}

  .status-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:1.25rem}
  .status-bar.ok{background:rgba(44,95,74,.08);color:var(--success)}
  .status-bar.loading{background:rgba(184,134,11,.08);color:var(--warn)}
  .status-bar.err{background:rgba(192,57,43,.08);color:var(--danger)}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .dot-ok{background:var(--success)}.dot-loading{background:var(--warn)}.dot-err{background:var(--danger)}

  .date-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
  .nav-btn{background:none;border:1px solid var(--cream3);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .15s}
  .nav-btn:hover{border-color:var(--gold);color:var(--gold)}
  .month-label{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--ink)}

  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1.5rem}
  .cal-head{text-align:center;font-size:11px;color:var(--ink3);font-weight:600;padding:4px 0;letter-spacing:.5px}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
  .cal-day.empty,.cal-day.disabled{cursor:default;color:var(--cream3)}
  .cal-day.available{color:var(--accent);font-weight:600;background:var(--cream2);border-color:var(--cream3)}
  .cal-day.available:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cal-day.selected{background:var(--accent);color:#fff!important;border-color:var(--accent);font-weight:600}
  .cal-day.today{border-color:var(--gold)!important}
  .cal-day.full{color:var(--cream3)!important;cursor:not-allowed}

  .slots{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
  .slot{border:1.5px solid var(--cream3);border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:all .2s;background:var(--cream)}
  .slot:hover:not(.slot-full){border-color:var(--accent2);background:rgba(44,95,74,.04)}
  .slot.selected{border-color:var(--accent);background:rgba(44,95,74,.06)}
  .slot.slot-full{cursor:not-allowed;opacity:.5}
  .slot-time{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .slot-info{font-size:12px;color:var(--ink3)}
  .slot-bar{height:4px;border-radius:2px;background:var(--cream3);margin-top:10px;overflow:hidden}
  .slot-fill{height:100%;border-radius:2px;background:var(--accent2);transition:width .4s}
  .slot-fill.warn{background:var(--gold)}.slot-fill.danger{background:var(--danger)}
  .slot-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:6px}
  .badge-ok{background:rgba(44,95,74,.1);color:var(--success)}
  .badge-warn{background:rgba(192,114,0,.1);color:var(--warn)}
  .badge-full{background:rgba(192,57,43,.1);color:var(--danger)}

  .form-card{background:#fff;border:1px solid var(--cream3);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
  .form-row{margin-bottom:1rem}
  .form-row:last-child{margin-bottom:0}
  .form-row label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:.35rem;letter-spacing:.3px}
  .form-row input{width:100%;padding:10px 12px;border:1px solid var(--cream3);border-radius:8px;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--ink);background:var(--cream);outline:none;transition:border .15s}
  .form-row input:focus{border-color:var(--accent2)}
  .form-row input.err{border-color:var(--danger)}
  .form-hint{font-size:11px;color:var(--danger);margin-top:3px;display:none}
  .form-hint.show{display:block}
  .form-row-half{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}

  .summary-box{background:var(--cream2);border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:13px;line-height:1.8}
  .submit-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
  .submit-btn:hover:not(:disabled){background:var(--accent2)}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed}

  .success-screen{display:none;text-align:center;padding:2rem 1rem}
  .success-screen.show{display:block}
  .success-icon{width:64px;height:64px;background:rgba(44,95,74,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:28px}
  .success-screen h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:.5rem}
  .success-screen p{font-size:14px;color:var(--ink3);margin-bottom:1.5rem}
  .confirm-card{background:#fff;border:1px solid var(--cream3);border-radius:12px;padding:1.25rem;text-align:left;margin-bottom:1.5rem}
  .confirm-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--cream2)}
  .confirm-row:last-child{border-bottom:none;font-weight:600;padding-top:8px}
  .confirm-row span:first-child{color:var(--ink3)}
  .new-booking-btn{background:none;border:1.5px solid var(--accent);color:var(--accent);padding:10px 24px;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
  .new-booking-btn:hover{background:var(--accent);color:#fff}

  .config-toggle{font-size:11px;color:var(--ink3);text-align:center;cursor:pointer;margin-top:2rem;letter-spacing:.5px}
  .config-toggle:hover{color:var(--gold)}
  .config-panel{display:none;background:#fff;border:1px solid var(--cream3);border-radius:12px;padding:1.25rem;margin-top:.75rem}
  .config-panel.show{display:block}
  .config-panel h3{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:1rem}
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
  .cfg-grid label,.cfg-full label{font-size:11px;color:var(--ink3);display:block;margin-bottom:3px;font-weight:600}
  .cfg-grid input,.cfg-full input{width:100%;padding:7px 9px;border:1px solid var(--cream3);border-radius:6px;font-size:12px;font-family:'Sarabun',sans-serif;background:var(--cream);outline:none;color:var(--ink)}
  .cfg-full{margin-bottom:.75rem}
  .config-save{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif}

  @media(max-width:500px){.slots,.cfg-grid,.form-row-half{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">นิทรรศการพิเศษ</div>
    <h1 id="exhibitionName">ศิลปะแห่งกาลเวลา</h1>
    <p>เปิดรับชมเฉพาะวันอังคารและพฤหัสบดี &nbsp;|&nbsp; จำกัด 50 ท่านต่อรอบ</p>
  </div>

  <div id="statusBar" class="status-bar loading">
    <div class="status-dot dot-loading" id="statusDot"></div>
    <span id="statusText">กำลังโหลดข้อมูลการจอง...</span>
  </div>

  <div id="bookingForm">
    <div class="section-label">เลือกวันที่</div>
    <div class="date-nav">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="calendar" id="calendar">
      <div class="cal-head">อา</div><div class="cal-head">จ</div><div class="cal-head">อ</div>
      <div class="cal-head">พ</div><div class="cal-head">พฤ</div><div class="cal-head">ศ</div><div class="cal-head">ส</div>
    </div>

    <div id="slotSection" style="display:none">
      <div class="section-label">เลือกรอบเวลา</div>
      <div class="slots" id="slots"></div>
    </div>

    <div id="infoSection" style="display:none">
      <div class="form-card">
        <div class="form-row">
          <label>ชื่อ-นามสกุล *</label>
          <input type="text" id="fname" placeholder="กรอกชื่อ-นามสกุล">
          <div class="form-hint" id="fnameErr">กรุณากรอกชื่อ-นามสกุล</div>
        </div>
        <div class="form-row-half">
          <div class="form-row" style="margin-bottom:0">
            <label>อายุ *</label>
            <input type="number" id="fage" placeholder="เช่น 25" min="1" max="120">
            <div class="form-hint" id="fageErr">กรุณากรอกอายุ (1–120)</div>
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label>เบอร์โทรศัพท์ *</label>
            <input type="tel" id="fphone" placeholder="08x-xxx-xxxx">
            <div class="form-hint" id="fphoneErr">กรุณากรอกเบอร์โทรศัพท์</div>
          </div>
        </div>
        <div class="form-row" style="margin-top:1rem">
          <label>อีเมล *</label>
          <input type="email" id="femail" placeholder="example@email.com">
          <div class="form-hint" id="femailErr">กรุณากรอกอีเมลให้ถูกต้อง</div>
        </div>
      </div>
      <div class="summary-box" id="summaryBox"></div>
      <button class="submit-btn" id="submitBtn">ยืนยันการจอง</button>
    </div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✓</div>
    <h2>จองสำเร็จแล้ว!</h2>
    <p id="successMsg"></p>
    <div class="confirm-card" id="confirmCard"></div>
    <button class="new-booking-btn" onclick="resetBooking()">จองรอบใหม่</button>
  </div>

  <div class="config-toggle" onclick="toggleConfig()">⚙ ตั้งค่าระบบ</div>
  <div class="config-panel" id="configPanel">
    <h3>การตั้งค่า</h3>
    <div class="cfg-full">
      <label>Google Apps Script URL *</label>
      <input type="text" id="cfgScriptUrl" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="cfg-grid">
      <div><label>EmailJS Public Key</label><input type="text" id="cfgPubKey" placeholder="YOUR_PUBLIC_KEY"></div>
      <div><label>Service ID</label><input type="text" id="cfgServiceId" placeholder="service_xxxxxxx"></div>
    </div>
    <div class="cfg-grid">
      <div><label>Template ID</label><input type="text" id="cfgTemplateId" placeholder="template_xxxxxxx"></div>
      <div><label>ชื่อนิทรรศการ</label><input type="text" id="cfgExhibition" placeholder="ชื่อนิทรรศการ"></div>
    </div>
    <button class="config-save" onclick="saveConfig()">บันทึกการตั้งค่า</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const CAPACITY=50,ALLOWED_DAYS=[2,4];
const SLOTS=[{id:'A',label:'10:30 – 11:30 น.'},{id:'B',label:'13:00 – 14:00 น.'}];
let cfg=JSON.parse(localStorage.getItem('exhCfgV2')||'{}');
let sheetCounts={},selectedDate=null,selectedSlot=null;
let currentYear,currentMonth;

function setStatus(t,m){
  document.getElementById('statusBar').className='status-bar '+t;
  document.getElementById('statusDot').className='status-dot dot-'+t;
  document.getElementById('statusText').textContent=m;
}
function getCount(d,s){return sheetCounts[d+'_'+s]||0;}

async function loadCounts(){
  if(!cfg.scriptUrl){setStatus('err','ยังไม่ได้ตั้งค่า Apps Script URL — คลิก ⚙ ตั้งค่าระบบ ด้านล่าง');return;}
  setStatus('loading','กำลังโหลดข้อมูลจาก Google Sheets...');
  try{
    const rows=await(await fetch(cfg.scriptUrl)).json();
    sheetCounts={};
    for(let i=1;i<rows.length;i++){
      const[,date,slot,,,,,count]=rows[i];
      if(!date||!slot)continue;
      const k=date+'_'+slot;
      sheetCounts[k]=(sheetCounts[k]||0)+Number(count||1);
    }
    setStatus('ok','เชื่อมต่อ Google Sheets สำเร็จ');
    renderCal();
    if(selectedDate)renderSlots();
  }catch(e){setStatus('err','โหลดข้อมูลไม่สำเร็จ — ตรวจสอบ Apps Script URL');}
}

function fmtDate(ds){
  const[y,m,d]=ds.split('-').map(Number);
  const mo=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d+' '+mo[m-1]+' '+(y+543);
}
function todayStr(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}

function init(){
  const n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();
  if(cfg.exhibition)document.getElementById('exhibitionName').textContent=cfg.exhibition;
  if(cfg.pubKey){try{emailjs.init(cfg.pubKey);}catch(e){}}
  renderCal();loadCounts();
}

function renderCal(){
  const mo=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('monthLabel').textContent=mo[currentMonth]+' '+(currentYear+543);
  const cal=document.getElementById('calendar');
  Array.from(cal.querySelectorAll('.cal-day')).forEach(e=>e.remove());
  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();
  const today=todayStr();
  for(let i=0;i<first;i++)cal.insertAdjacentHTML('beforeend','<div class="cal-day empty"></div>');
  for(let d=1;d<=days;d++){
    const dow=new Date(currentYear,currentMonth,d).getDay();
    const ds=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isPast=ds<today,isAllowed=ALLOWED_DAYS.includes(dow);
    const allFull=isAllowed&&SLOTS.every(s=>getCount(ds,s.id)>=CAPACITY);
    let cls='cal-day';
    if(ds===today)cls+=' today';
    if(ds===selectedDate)cls+=' selected';
    else if(!isAllowed||isPast)cls+=' disabled';
    else if(allFull)cls+=' full disabled';
    else cls+=' available';
    const ok=isAllowed&&!isPast&&!allFull;
    cal.insertAdjacentHTML('beforeend',`<div class="${cls}" ${ok?`onclick="selectDate('${ds}')"`:''}>${d}</div>`);
  }
}

function selectDate(ds){
  selectedDate=ds;selectedSlot=null;
  renderCal();renderSlots();
  document.getElementById('slotSection').style.display='block';
  document.getElementById('infoSection').style.display='none';
}

function renderSlots(){
  const el=document.getElementById('slots');el.innerHTML='';
  SLOTS.forEach(s=>{
    const cnt=getCount(selectedDate,s.id),rem=CAPACITY-cnt;
    const pct=Math.round((cnt/CAPACITY)*100);
    const isFull=rem<=0;
    const fillCls=pct>=85?'danger':pct>=60?'warn':'';
    const badgeCls=isFull?'badge-full':rem<=10?'badge-warn':'badge-ok';
    const badgeTxt=isFull?'เต็มแล้ว':rem<=10?'เหลือ '+rem+' ที่นั่ง':'ว่าง '+rem+' ที่นั่ง';
    const sel=selectedSlot===s.id?'selected':'';
    el.insertAdjacentHTML('beforeend',`
      <div class="slot ${isFull?'slot-full':''} ${sel}" ${!isFull?`onclick="selectSlot('${s.id}')"`:''}>
        <div class="slot-time">${s.label}</div>
        <div class="slot-info">จองแล้ว ${cnt}/${CAPACITY} ท่าน</div>
        <div class="slot-bar"><div class="slot-fill ${fillCls}" style="width:${pct}%"></div></div>
        <span class="slot-badge ${badgeCls}">${badgeTxt}</span>
      </div>`);
  });
}

function selectSlot(id){
  selectedSlot=id;renderSlots();updateSummary();
  document.getElementById('infoSection').style.display='block';
  document.getElementById('infoSection').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function updateSummary(){
  if(!selectedDate||!selectedSlot)return;
  const s=SLOTS.find(x=>x.id===selectedSlot);
  document.getElementById('summaryBox').innerHTML=
    `<strong>วันที่:</strong> ${fmtDate(selectedDate)}<br><strong>รอบเวลา:</strong> ${s.label}`;
}

document.getElementById('prevMonth').onclick=()=>{
  if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--;
  selectedDate=null;selectedSlot=null;
  document.getElementById('slotSection').style.display='none';
  document.getElementById('infoSection').style.display='none';
  renderCal();
};
document.getElementById('nextMonth').onclick=()=>{
  if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++;
  selectedDate=null;selectedSlot=null;
  document.getElementById('slotSection').style.display='none';
  document.getElementById('infoSection').style.display='none';
  renderCal();
};

document.getElementById('submitBtn').onclick=async()=>{
  const name=document.getElementById('fname').value.trim();
  const ageVal=document.getElementById('fage').value.trim();
  const age=parseInt(ageVal);
  const phone=document.getElementById('fphone').value.trim();
  const email=document.getElementById('femail').value.trim();

  const ageOk=ageVal&&!isNaN(age)&&age>=1&&age<=120;
  const phoneOk=phone.length>=9;
  const emailOk=email&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  document.getElementById('fnameErr').classList.toggle('show',!name);
  document.getElementById('fname').classList.toggle('err',!name);
  document.getElementById('fageErr').classList.toggle('show',!ageOk);
  document.getElementById('fage').classList.toggle('err',!ageOk);
  document.getElementById('fphoneErr').classList.toggle('show',!phoneOk);
  document.getElementById('fphone').classList.toggle('err',!phoneOk);
  document.getElementById('femailErr').classList.toggle('show',!emailOk);
  document.getElementById('femail').classList.toggle('err',!emailOk);
  if(!name||!ageOk||!phoneOk||!emailOk)return;

  if(getCount(selectedDate,selectedSlot)>=CAPACITY){alert('ขออภัย รอบนี้เต็มแล้ว');return;}

  const btn=document.getElementById('submitBtn');
  btn.textContent='กำลังบันทึก...';btn.disabled=true;

  const s=SLOTS.find(x=>x.id===selectedSlot);
  const ref='EXH-'+Date.now().toString(36).toUpperCase();
  const payload={ref,date:selectedDate,slot:selectedSlot,name,age,email,phone,count:1};

  let sheetOk=false,emailSent=false;
  if(cfg.scriptUrl){
    try{
      await fetch(cfg.scriptUrl,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'application/json'}});
      sheetOk=true;
      const k=selectedDate+'_'+selectedSlot;
      sheetCounts[k]=(sheetCounts[k]||0)+1;
    }catch(e){console.error(e);}
  }
  if(cfg.pubKey&&cfg.serviceId&&cfg.templateId){
    try{
      await emailjs.send(cfg.serviceId,cfg.templateId,{
        to_name:name,to_email:email,
        booking_date:fmtDate(selectedDate),
        booking_time:s.label,
        booking_ref:ref,
        visitor_age:age,
        visitor_phone:phone,
        exhibition_name:document.getElementById('exhibitionName').textContent
      });
      emailSent=true;
    }catch(e){console.error(e);}
  }

  btn.textContent='ยืนยันการจอง';btn.disabled=false;
  const msg=[];
  if(sheetOk)msg.push('บันทึกลง Google Sheets แล้ว');
  if(emailSent)msg.push('ส่งอีเมลยืนยันไปที่ '+email+' แล้ว');
  if(!sheetOk&&!emailSent)msg.push('จองสำเร็จ (กรุณาตั้งค่าระบบเพื่อเปิดใช้งานเต็มรูปแบบ)');

  document.getElementById('bookingForm').style.display='none';
  document.getElementById('successScreen').classList.add('show');
  document.getElementById('successMsg').textContent=msg.join(' · ');
  document.getElementById('confirmCard').innerHTML=`
    <div class="confirm-row"><span>ชื่อ</span><span>${name}</span></div>
    <div class="confirm-row"><span>อายุ</span><span>${age} ปี</span></div>
    <div class="confirm-row"><span>เบอร์โทร</span><span>${phone}</span></div>
    <div class="confirm-row"><span>วันที่</span><span>${fmtDate(selectedDate)}</span></div>
    <div class="confirm-row"><span>รอบเวลา</span><span>${s.label}</span></div>
    <div class="confirm-row"><span>รหัสอ้างอิง</span><span>${ref}</span></div>
  `;
  renderCal();
};

function resetBooking(){
  selectedDate=null;selectedSlot=null;
  ['fname','fage','fphone','femail'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('slotSection').style.display='none';
  document.getElementById('infoSection').style.display='none';
  document.getElementById('bookingForm').style.display='block';
  document.getElementById('successScreen').classList.remove('show');
  loadCounts();
}

function toggleConfig(){
  const p=document.getElementById('configPanel');
  p.classList.toggle('show');
  if(p.classList.contains('show')){
    document.getElementById('cfgScriptUrl').value=cfg.scriptUrl||'';
    document.getElementById('cfgPubKey').value=cfg.pubKey||'';
    document.getElementById('cfgServiceId').value=cfg.serviceId||'';
    document.getElementById('cfgTemplateId').value=cfg.templateId||'';
    document.getElementById('cfgExhibition').value=cfg.exhibition||'';
  }
}

function saveConfig(){
  cfg={
    scriptUrl:document.getElementById('cfgScriptUrl').value.trim(),
    pubKey:document.getElementById('cfgPubKey').value.trim(),
    serviceId:document.getElementById('cfgServiceId').value.trim(),
    templateId:document.getElementById('cfgTemplateId').value.trim(),
    exhibition:document.getElementById('cfgExhibition').value.trim()
  };
  localStorage.setItem('exhCfgV2',JSON.stringify(cfg));
  if(cfg.pubKey){try{emailjs.init(cfg.pubKey);}catch(e){}}
  if(cfg.exhibition)document.getElementById('exhibitionName').textContent=cfg.exhibition;
  document.getElementById('configPanel').classList.remove('show');
  loadCounts();
}

init();
</script>
</body>
</html>
